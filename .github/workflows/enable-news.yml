name: Enable News

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enable-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - run: |
          mv content/news/rebuilding-day-one.disabled content/news/rebuilding-day-one

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content
          git commit -m "Temporarily enable news section" || echo "No changes"
          git push origin HEAD:main
