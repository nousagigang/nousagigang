name: Import Rebuilding Day One Folder

on:
  workflow_dispatch:

jobs:
  import-folder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repository
        uses: actions/checkout@v4
        with:
          ref: test

      - name: Clone legacy repository
        run: |
          git clone --depth 1 https://github.com/k4lm3d/nsg.git legacy

      - name: Create destination directory
        run: |
          mkdir -p static/news

      - name: Copy folder
        run: |
          cp -R legacy/content/news/rebuilding-day-one \
                static/news/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add static/news/rebuilding-day-one

          git commit -m "Import rebuilding-day-one folder from legacy repository" || echo "No changes"

          git push origin test
